<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Generador de Cajones</title>
  <link rel="stylesheet" href="dialog.css">
</head>
<body>
  <div class="dialog-shell">
    <div class="dialog-window">

      <div class="dialog-header clearfix">
        <div class="brand-icon" aria-hidden="true">BIRA</div>
        <button type="button" class="close-btn" aria-label="Cerrar" onclick="onCerrar()">&#215;</button>
        <div class="header-text">
          <h1>Generador de Cajones</h1>
          <p>Cre&aacute; cajones desde una base seleccionada</p>
        </div>
      </div>

      <div class="panel panel-base clearfix" id="panelBase">
        <div class="base-thumb-col">
          <div class="base-thumb" aria-hidden="true">
            <svg width="58" height="38" viewBox="0 0 260 150" xmlns="http://www.w3.org/2000/svg">
              <polygon points="30,40 115,12 225,58 141,86" fill="#ececed" stroke="#888892" stroke-width="2"/>
              <polygon points="30,40 30,68 141,115 141,86" fill="#ececef" stroke="#888892" stroke-width="2"/>
              <polygon points="141,86 225,58 225,86 141,115" fill="#f7f7f8" stroke="#888892" stroke-width="2"/>
              <g stroke="#1880ff" stroke-width="5" stroke-linecap="round">
                <line x1="116" y1="69" x2="116" y2="53"/>
                <line x1="99" y1="77" x2="88" y2="69"/>
                <line x1="134" y1="79" x2="147" y2="71"/>
                <line x1="101" y1="96" x2="90" y2="105"/>
                <line x1="133" y1="98" x2="145" y2="108"/>
              </g>
              <g transform="translate(95,62)">
                <path d="M0 0 L0 67 L18 52 L30 81 L42 75 L29 47 L53 47 Z" fill="#ffffff" stroke="#111111" stroke-width="4" stroke-linejoin="round"/>
              </g>
            </svg>
          </div>
          <button type="button" class="footer-btn" onclick="onSeleccionarBase()">Seleccionar base</button>
        </div>

        <div class="base-info-col">
          <div class="status-line">
            <span class="status-icon" aria-hidden="true" id="baseIcon" style="display:none;">
              <svg width="15" height="15" viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
                <circle cx="16" cy="16" r="15" fill="#25a71a"/>
                <path d="M9 16l5 5 9-11" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
              </svg>
            </span>
            <span id="baseStatusText">Sin base seleccionada</span>
          </div>
          <div class="dim-card">
            <div class="dim-row">Largo: <span id="dimLargo">&mdash;</span></div>
            <div class="dim-row">Ancho: <span id="dimAncho">&mdash;</span></div>
          </div>
        </div>

        <div class="base-choice-col clearfix">
          <div class="choice-title">Tomar como ancho del caj&oacute;n</div>
          <div class="choice-card">
            <div class="radio-stack-item">
              <input type="radio" name="ladoAncho" id="ladoLargo" value="largo">
              <label for="ladoLargo"><span class="radio-dot"></span>Largo (<span id="optLargo">&mdash;</span>)</label>
            </div>
            <div class="radio-stack-item">
              <input type="radio" name="ladoAncho" id="ladoAncho" value="ancho">
              <label for="ladoAncho"><span class="radio-dot"></span>Ancho (<span id="optAncho">&mdash;</span>)</label>
            </div>
          </div>
        </div>
      </div>

      <div class="panel panel-options">
        <h2>Opciones del caj&oacute;n</h2>
        <div class="two-col clearfix top-options-row">
          <div class="col half-col left-col">
            <div class="field-label">Tipo de corredera</div>
            <div class="pill-group clearfix">
              <div class="pill-item">
                <input type="radio" name="corredera" id="corrTel" value="telescopica">
                <label for="corrTel"><span class="radio-dot"></span>Telesc&oacute;pica</label>
              </div>
              <div class="pill-item">
                <input type="radio" name="corredera" id="corrOcu" value="oculta">
                <label for="corrOcu"><span class="radio-dot"></span>Oculta</label>
              </div>
            </div>
          </div>
          <div class="col half-col right-col">
            <div class="field-label">Espesor de placa</div>
            <div class="pill-group clearfix">
              <div class="pill-item">
                <input type="radio" name="espesor" id="esp18" value="18">
                <label for="esp18"><span class="radio-dot"></span>18 mm</label>
              </div>
              <div class="pill-item">
                <input type="radio" name="espesor" id="esp15" value="15">
                <label for="esp15"><span class="radio-dot"></span>15 mm</label>
              </div>
            </div>
          </div>
        </div>

        <div class="two-col clearfix bottom-options-row">
          <div class="col half-col left-col">
            <label class="field-label" for="profundidad">Profundidad del caj&oacute;n</label>
            <div class="number-field clearfix">
              <input type="number" id="profundidad">
              <span class="unit">mm</span>
            </div>
          </div>
          <div class="col half-col right-col">
            <label class="field-label" for="alto">Alto del caj&oacute;n</label>
            <div class="number-field clearfix">
              <input type="number" id="alto">
              <span class="unit">mm</span>
            </div>
          </div>
        </div>
      </div>

      <div class="primary-action">
        <button type="button" id="btnGenerar" onclick="onGenerar()">GENERAR CAJ&Oacute;N</button>
      </div>

      <div class="panel panel-table">
        <h2>Cajones creados</h2>
        <div class="table-wrap">
          <table class="data-table" cellspacing="0" cellpadding="0">
            <thead>
              <tr>
                <th>Nombre</th><th>Ancho</th><th>Alto</th><th>Prof.</th><th>Esp.</th><th>Corredera</th>
              </tr>
            </thead>
            <tbody id="tablaBody">
              <tr><td colspan="6" class="empty-msg">No hay cajones creados</td></tr>
            </tbody>
          </table>
        </div>
      </div>

      <div class="dialog-footer clearfix">
        <button type="button" class="footer-btn" onclick="onSincronizar()">
          <span class="footer-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M20 7v5h-2V9.7l-3.2 3.2-1.4-1.4L16.6 8H14V6h6v1z" fill="none" stroke="#111827" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M8 6a6 6 0 0 1 7.5-1.2" fill="none" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
              <path d="M16 18a6 6 0 0 1-7.5 1.2" fill="none" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="footer-text">Sincronizar</span>
        </button>
        <button type="button" class="footer-btn" onclick="onGuardar()">
          <span class="footer-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M5 3h11l3 3v15H5z" fill="none" stroke="#111827" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M8 3v6h8V3" fill="none" stroke="#111827" stroke-width="1.8" stroke-linejoin="round"/>
              <path d="M9 18h6" fill="none" stroke="#111827" stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="footer-text">Guardar</span>
        </button>
        <button type="button" class="footer-btn" onclick="onCerrar()">
          <span class="footer-icon" aria-hidden="true">
            <svg width="14" height="14" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path d="M6 6l12 12M18 6L6 18" fill="none" stroke="#111827" stroke-width="1.9" stroke-linecap="round"/>
            </svg>
          </span>
          <span class="footer-text">Cerrar</span>
        </button>
      </div>

    </div>
  </div>

<script type="text/javascript" src="dialog.js"></script>
</body>
</html>
